version: '3.8'

services:
  # PHP-FPM Service
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yii2_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_UPLOAD_MAX_FILESIZE=50M
      - PHP_POST_MAX_SIZE=50M
      - mysql_host=34.71.143.136
      - mysql_port=3306
      - mysql_db_name=derrick
      - mysql_username=root
      - mysql_password=rootpassword123
      - postgres_host=34.71.143.136
      - postgres_port=5432
      - postgres_db_name=datawarehouse
      - postgres_username=appuser
      - postgres_password=AppPass!123
    networks:
      - yii2-network
    # Note: external DB at 34.71.143.136; no local DB dependency

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: yii2_nginx
    restart: unless-stopped
    ports:
      - "2000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/logs:/var/log/nginx
    networks:
      - yii2-network
    depends_on:
      - php

  # Databases are provided externally at 34.71.143.136 (MySQL & PostgreSQL)

networks:
  yii2-network:
    driver: bridge

volumes:
  # No local DB volumes required when using external DB
