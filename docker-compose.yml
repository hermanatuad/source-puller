version: '3.8'

services:
  # PHP-FPM Service
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yii2_php_source_puller
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - vendor_data:/var/www/html/vendor
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_UPLOAD_MAX_FILESIZE=50M
      - PHP_POST_MAX_SIZE=50M
    env_file:
      - .env
    networks:
      - yii2-network
    # Note: external DB at 34.71.143.136; no local DB dependency

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: yii2_nginx_source_puller
    restart: unless-stopped
    ports:
      - "2001:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/logs:/var/log/nginx
      - vendor_data:/var/www/html/vendor:ro
    networks:
      - yii2-network
    depends_on:
      - php

  # Databases are provided externally at 34.71.143.136 (MySQL & PostgreSQL)

networks:
  yii2-network:
    driver: bridge

volumes:
  vendor_data:
    driver: local
